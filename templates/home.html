{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row align-items-center" style="min-height: 500px;">
        <div class="col-md-6">
            <h1 class="display-4">Welcome to EduPay</h1>
            <p class="lead">Smart College Fee Management Portal</p>
            <p>Manage student fees, payments, and financial reporting efficiently.</p>
            
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">Go to Dashboard</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Login Now</a>
            {% endif %}
        </div>
        <div class="col-md-6 text-center">
            <i class="bi bi-mortarboard-fill" style="font-size: 150px; color: #0066cc;"></i>
        </div>
    </div>
</div>
{% endblock %}
