{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4">
                        <i class="bi bi-mortarboard-fill"></i> Login to EduPay
                    </h3>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>

                    <p class="text-center mb-3">
                        Don't have an account?
                        <a href="{% url 'register' %}">Register here</a>
                    </p>
                    
                    <hr class="my-4">
                    <p class="text-center text-muted small"><strong>Demo Credentials:</strong></p>
                    <div class="alert alert-info alert-sm" role="alert">
                        <small>
                            <strong>Admin:</strong> admin / admin123<br>
                            <strong>Accountant:</strong> accountant / accountant123<br>
                            <strong>Student:</strong> student / student123
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
